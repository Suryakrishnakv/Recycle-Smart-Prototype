<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pickup Request - WasteWise</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <nav>
        <a href="index.html" class="logo">
            <i class="fas fa-recycle"></i> WasteWise
        </a>
        <div class="nav-links">
            <a href="search.html">Search</a>
            <a href="recycling-centers.html">Centers</a>
            <a href="pickup-request.html">Pickup</a>
            <a href="admin-dashboard.html">Admin</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <header style="text-align: center; margin-bottom: 2rem;">
            <h1>Scheduled Pickup</h1>
            <p>Fill in your details for a hassle-free waste collection.</p>
        </header>

        <form id="pickupForm" class="card">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <textarea id="address" required placeholder="Street, Building, Apartment No." rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="wasteType">Waste Type</label>
                <select id="wasteType" required>
                    <option value="" disabled selected>Select category</option>
                    <option value="dry">Dry Waste (Plastic, Paper, Glass)</option>
                    <option value="wet">Wet Waste (Organic, Food)</option>
                    <option value="ewaste">E-Waste (Electronics, Batteries)</option>
                    <option value="mixed">Mixed Waste</option>
                </select>
            </div>

            <div class="form-group">
                <label for="wasteImage">Upload Waste Image (Optional)</label>
                <input type="file" id="wasteImage" accept="image/*">
            </div>

            <button type="submit" class="btn-large">Submit Request</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 RecycleSmart - Built for SDG 12</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
